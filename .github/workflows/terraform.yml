# Runs Terraform static checks (fmt + validate) on PRs that touch the
# terraform/ tree. Apply is intentionally run locally by the user, not
# by CI: remote state and a PAT with admin scope would both need to be
# provisioned first, and that is its own increment. What this job proves
# is that the HCL is well-formed and the provider resolves — the IaC
# equivalent of a linter.
name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [ "main" ]
    paths:
      - "terraform/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

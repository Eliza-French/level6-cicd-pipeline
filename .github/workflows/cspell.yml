# Spell-check for blog content. Runs on every PR (so it can be a
# required status check on main) and on pushes to main that touch a
# post, the homepage, or the dictionary itself. The cspell action
# below is scoped to _posts/**/*.md and index.md, so the actual work
# stays narrow even when the trigger does not.
name: Spell check

on:
  pull_request:
  push:
    branches: ["main"]
    paths:
      - "_posts/**"
      - "index.md"
      - "cspell.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: |
            _posts/**/*.md
            index.md
          config: cspell.json
          inline: warning
          strict: true

# Link checker for blog content. Runs in two modes:
#
#  - pull_request: fast gate on any PR that touches markdown under
#    _posts/ or index.md — catches broken links before they ship.
#  - schedule (nightly): sweeps the already-published content to catch
#    link rot over time, and opens a tracking issue if anything is
#    broken so the failure can't sit silently in the Actions tab.
#
# Scope is deliberately narrow (blog content only, not README.md) so
# the PR-time gate stays reliable; README's external link surface is
# large enough to produce transient flakes that would teach the team
# to ignore the check. Expanding scope is a one-line change if that
# trade-off needs revisiting.
name: Link check

on:
  pull_request:
    branches: [ "main" ]
  schedule:
    # 07:00 UTC daily. Off-peak for UK contributors; before the
    # morning stand-up if there is one.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,429
            --max-retries 2
            --cache
            --max-cache-age 1d
            './_posts/**/*.md'
            './index.md'
          fail: true

      - name: Open tracking issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link rot detected by nightly check"
          content-filepath: ./lychee/out.md
          labels: |
            link-rot
            automated
